<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hh-clone</title>

    <script type="text/javascript">
      // Выполняем только на GitHub Pages
      if (window.location.hostname === "vikorikus.github.io") {
        (function (l) {
          // Обрабатываем только специальные URL вида ?p=/...
          if (l.search.startsWith("?p=")) {
            var decoded = l.search
              .slice(3) // убираем "?p="
              .replace(/~and~/g, "&");

            // decoded уже содержит корректный путь, например:
            // /hhappclone/vacancies?page=2
            window.history.replaceState(null, null, decoded + l.hash);
          }
        })(window.location);
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
