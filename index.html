<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hh-clone</title>

    <script type="text/javascript">
      (function (l) {
        if (l.search.startsWith("?p=/")) {
          var fullPath = l.search.slice(3).replace(/~and~/g, "&");
          // fullPath теперь выглядит как "/vacancies?page=2"

          var newUrl =
            l.pathname.slice(0, l.pathname.lastIndexOf("/")) + fullPath;

          window.history.replaceState(null, null, newUrl);
        }
      })(window.location);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
