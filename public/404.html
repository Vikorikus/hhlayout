<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>hh-clone</title>
    <script type="text/javascript">
      (function (l) {
        if (l.search.indexOf("p=/") > -1) {
          var pathname = l.search.split("p=/")[1].split("&")[0];
          var query = l.search.split("&").slice(1).join("&");
          var newUrl =
            l.pathname.slice(0, l.pathname.lastIndexOf("/")) +
            pathname +
            (query ? "?" + query : "");
          window.history.replaceState(null, null, newUrl);
        }
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
