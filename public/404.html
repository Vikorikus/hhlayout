<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HH App Clone</title>
    <script type="text/javascript">
      // Эта часть берет текущий путь и превращает его в строку запроса
      var l = window.location;
      // hhappclone — это твой basename
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          "/hhappclone/?p=" +
          l.pathname.replace("/hhappclone/", "").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
